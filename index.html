<!DOCTYPE html>
<html>

<head>
    <title>Car Care Admin</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <!-- Sidebar -->
        <div class="sidebar">
            <h2>CarCare</h2>
            <ul>
                <li>Dashboard</li>
                <li>Orders</li>
                <li>Pending Works</li>
                <li>Services</li>
                <li>Inventory</li>
                <li>Finance</li>
                <li>Logout</li>
            </ul>
        </div>

        <!-- Main Content -->
        <div class="main">

            <!-- Header -->
            <div class="header">
                <h1>Dashboard</h1>
            </div>

            <!-- Cards -->
            <div class="cards">
                <div class="card">Total Orders: 120</div>
                <div class="card">Pending: 25</div>
                <div class="card">Revenue: ₹50,000</div>
            </div>

            <!-- Orders Table -->
            <div class="table-section">
                <h2>Recent Orders</h2>
                <table>
                    <tr>
                        <th>Order ID</th>
                        <th>Customer</th>
                        <th>Service</th>
                        <th>Status</th>
                    </tr>
                    <tr>
                        <td>#101</td>
                        <td>Rahul</td>
                        <td>Car Wash</td>
                        <td>Pending</td>
                    </tr>
                </table>
            </div>

        </div>

    </div>

</body>

</html>
