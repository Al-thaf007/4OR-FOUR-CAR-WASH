<!DOCTYPE html>
<html>

<head>
    <title>Pending Works</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <!-- Sidebar -->
        <div class="sidebar">
            <h2>CarCare</h2>
            <ul>
                <li>Dashboard</li>
                <li>Orders</li>
                <li>Pending Works</li>
                <li>Services</li>
                <li>Inventory</li>
                <li>Finance</li>
                <li>Logout</li>
            </ul>
        </div>

        <!-- Main -->
        <div class="main">

            <div class="header">
                <h1>Pending Works</h1>
            </div>

            <!-- Work Cards -->
            <div class="work-container">

                <!-- Work Item -->
                <div class="work-card urgent">
                    <h3>#101 - Car Wash</h3>
                    <p>Customer: Rahul</p>
                    <p>Worker: Ajay</p>
                    <span class="badge urgent-badge">URGENT</span>
                    <button class="btn start">Start</button>
                </div>

                <div class="work-card">
                    <h3>#102 - Ceramic Coating</h3>
                    <p>Customer: Arjun</p>
                    <p>Worker: Manu</p>
                    <button class="btn start">Start</button>
                </div>

                <div class="work-card delayed">
                    <h3>#103 - Car Valet</h3>
                    <p>Customer: Nikhil</p>
                    <p>Worker: Suresh</p>
                    <span class="badge delay-badge">DELAYED</span>
                    <button class="btn start">Start</button>
                </div>

            </div>

        </div>

    </div>

</body>

</html>
